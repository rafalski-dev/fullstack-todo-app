<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero mobile mockup — To Do</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: #1a1a1a;
      font-family: 'Hanken Grotesk', sans-serif;
    }

    .phone {
      width: 360px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #111010;
      overflow: hidden;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
    }

    .hero {
      position: relative;
      overflow: hidden;
      min-height: 720px;
      padding: 56px 22px 30px;
    }

    /* ORBITUJĄCE ORBY */
    .orb {
      position: absolute;
      z-index: 1;
      border-radius: 50%;
      background: #f5b544;
      filter: blur(65px);
    }
    .orb1 {
      top: -70px; left: -90px;
      width: 250px; height: 240px;
      opacity: 0.5;
      animation: orbit1 10s ease-in-out infinite;
    }
    .orb2 {
      top: 38%; right: -80px;
      width: 220px; height: 210px;
      opacity: 0.42;
      animation: orbit2 12s ease-in-out infinite;
    }
    .orb3 {
      bottom: -50px; left: 30px;
      width: 180px; height: 170px;
      opacity: 0.34;
      animation: orbit3 14s ease-in-out infinite;
    }
    @keyframes orbit1 {
      0%, 100% { transform: translate(0, 0)        scale(1); }
      25%      { transform: translate(70px, 30px)  scale(1.15); }
      50%      { transform: translate(90px, 90px)  scale(1.25); }
      75%      { transform: translate(20px, 70px)  scale(1.1); }
    }
    @keyframes orbit2 {
      0%, 100% { transform: translate(0, 0)         scale(1); }
      25%      { transform: translate(-60px, 40px)  scale(1.18); }
      50%      { transform: translate(-80px, -50px) scale(1.1); }
      75%      { transform: translate(-20px, -70px) scale(1.2); }
    }
    @keyframes orbit3 {
      0%, 100% { transform: translate(0, 0)         scale(1); }
      33%      { transform: translate(50px, -40px)  scale(1.22); }
      66%      { transform: translate(-30px, -60px) scale(1.12); }
    }

    .content { position: relative; z-index: 2; }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 42px;
    }
    .logo { display: flex; align-items: center; gap: 9px; }
    .logo .icon {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px;
      background: #f5b544;
      border-radius: 9px;
    }
    .logo .icon i { font-size: 17px; color: #0a0a0b; }
    .logo span {
      font-family: 'Fraunces', serif;
      font-size: 22px; font-weight: 500; color: #ededef;
    }
    .signin-top {
      font-size: 13px; font-weight: 500;
      color: #f5b544;
      text-decoration: none;
      padding: 7px 14px;
      background: rgba(245, 181, 68, 0.08);
      border: 1px solid rgba(245, 181, 68, 0.3);
      border-radius: 9px;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: #f5b544;
      background: rgba(245, 181, 68, 0.1);
      border: 1px solid rgba(245, 181, 68, 0.25);
      border-radius: 999px;
      padding: 5px 12px;
      margin-bottom: 18px;
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 600; font-size: 33px; line-height: 1.12;
      color: #ededef; margin-bottom: 14px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 14.5px; line-height: 1.55;
      color: #818193; margin-bottom: 24px;
    }
    .cta-col { display: flex; flex-direction: column; gap: 11px; margin-bottom: 16px; }
    .cta-primary {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 15px; font-weight: 600; color: #1a1407;
      background: #f5b544;
      border-radius: 12px; padding: 14px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(245, 181, 68, 0.22);
    }
    .cta-secondary {
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 500; color: #ededef;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px; padding: 14px;
      text-decoration: none;
    }
    .trust { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: #56565e; margin-bottom: 28px; }
    .trust i { font-size: 14px; color: #f5b544; }

    .panel {
      background: rgba(20, 20, 20, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(12px);
    }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 13px;
    }
    .panel-head .title { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; color: #ededef; }
    .panel-head .count {
      font-size: 11px; color: #818193;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 7px; padding: 3px 8px;
    }
    .tasks { display: flex; flex-direction: column; gap: 8px; }
    .task {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .check-done {
      flex: none; width: 18px; height: 18px;
      border-radius: 6px; background: #f5b544;
      display: flex; align-items: center; justify-content: center;
    }
    .check-done i { font-size: 12px; color: #1a1407; }
    .check-empty {
      flex: none; width: 18px; height: 18px;
      border-radius: 6px;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
    }
    .task .label { font-size: 13px; color: #ededef; }
    .task .label.done { color: #56565e; text-decoration: line-through; }

    /* DEMO: celowo WYŁĄCZONE, żeby animacja działała mimo systemowego "reduce motion".
       W prawdziwym komponencie ZOSTAW to włączone (dostępność):
    @media (prefers-reduced-motion: reduce) {
      .orb { animation: none; }
    }
    */
  </style>
</head>
<body>
  <div class="phone">
    <div class="hero">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>

      <div class="content">
        <nav>
          <div class="logo">
            <div class="icon"><i class="ti ti-list-details"></i></div>
            <span>To Do</span>
          </div>
          <a href="#" class="signin-top">Sign in</a>
        </nav>

        <div class="badge"><i class="ti ti-sparkles"></i>Stay on top of your day</div>
        <h1>Get things done, one task at a time.</h1>
        <p class="subtitle">A simple, focused to-do app to capture tasks, track progress and clear your mind.</p>

        <div class="cta-col">
          <a href="#" class="cta-primary">Get started<i class="ti ti-arrow-narrow-right"></i></a>
          <a href="#" class="cta-secondary">Sign in</a>
        </div>
        <div class="trust"><i class="ti ti-lock"></i>Free to use · your tasks stay private</div>

        <div class="panel">
          <div class="panel-head">
            <span class="title">Today</span>
            <span class="count">1 / 3 done</span>
          </div>
          <div class="tasks">
            <div class="task">
              <span class="check-done"><i class="ti ti-check"></i></span>
              <span class="label done">Morning workout</span>
            </div>
            <div class="task">
              <span class="check-empty"></span>
              <span class="label">Finish hero section</span>
            </div>
            <div class="task">
              <span class="check-empty"></span>
              <span class="label">Collect parcel</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
